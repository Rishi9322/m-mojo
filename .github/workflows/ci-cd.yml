name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy_vercel:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check Vercel secrets
        id: vercel_secrets
        shell: bash
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (missing secrets)
        if: steps.vercel_secrets.outputs.ready != 'true'
        run: echo "Skipping Vercel deploy because required secrets are not configured."

      - name: Checkout
        if: steps.vercel_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel_secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.vercel_secrets.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.vercel_secrets.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Vercel
        if: steps.vercel_secrets.outputs.ready == 'true'
        run: npx vercel deploy --prod --yes --token=${VERCEL_TOKEN}
